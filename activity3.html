<!DOCTYPE html>
<html lang="en">
<head>
    <style>
         #box{
            box-shadow: 9px 9px 5px red;
            background-color:beige;
            font-size: 20px;
            font-family:cursive;
            font-weight:900
            
            
            /* (right-offset)px (left-offside)px (fade)px color*/
             
         }
         #text{
            font-size: 20px;
            font-weight: 900;
            font-family: monospace;
            text-shadow: 2px 2px 1px green;
            /* (right-offset)px (left-offset)px (fade)px color*/            
         }
         #indent{
            text-indent: 50%; //16px or -3em
         }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="box">We can keep box shadows</div><br><br>
    <div id="text">we can keep text shadow</div>
    <p id="indent">This is how we keep an indent</p>
</body>
</html>
